services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: url-jobs-api
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
